name: devsecops-pipeline

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  dependency-scan:
    name: Dependency vulnerability scan (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit
      - name: Audit dependencies and create report
        run: |
          mkdir -p artifacts
          pip-audit -r requirements.txt -f json -o artifacts/dependency-scan.json
          python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path("artifacts/dependency-scan.json").read_text())
          dep_count = len(report.get("dependencies", []))
          vuln_count = sum(len(dep.get("vulns", [])) for dep in report.get("dependencies", []))
          Path("artifacts/dependency-summary.txt").write_text(
              f"dependencies_scanned={dep_count}\nvulnerabilities_found={vuln_count}\n"
          )
          print(Path("artifacts/dependency-summary.txt").read_text())
          PY
          pip-audit -r requirements.txt --strict
      - name: Upload dependency scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-scan-${{ github.sha }}
          path: artifacts/

  sast-scan:
    name: SAST scan (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit
      - name: Run SAST and create report
        run: |
          mkdir -p artifacts
          bandit -r app -f json -o artifacts/sast-bandit.json
          bandit -r app -lll -f txt -o artifacts/sast-summary.txt
      - name: Upload SAST artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-scan-${{ github.sha }}
          path: artifacts/

  secret-scan:
    name: Secret scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@v0.2.2
      - name: Run secret scan and create report
        run: |
          mkdir -p artifacts
          trivy fs . \
            --scanners secret \
            --format json \
            --output artifacts/secret-scan.json \
            --no-progress
          python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path("artifacts/secret-scan.json").read_text())
          findings = 0
          for result in report.get("Results", []):
              findings += len(result.get("Secrets", []))
          Path("artifacts/secret-scan-summary.txt").write_text(
              f"secret_findings={findings}\n"
          )
          print(Path("artifacts/secret-scan-summary.txt").read_text())
          if findings > 0:
              raise SystemExit("Secret scan failed: findings detected.")
          PY
      - name: Upload secret scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-${{ github.sha }}
          path: artifacts/

  unit-tests:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies + test tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run tests
        run: |
          python -m pytest -q

  build-image:
    name: Container build
    runs-on: ubuntu-latest
    needs: [dependency-scan, sast-scan, secret-scan, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build container image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: secure-app:${{ github.sha }}
          outputs: type=docker,dest=/tmp/secure-app-${{ github.sha }}.tar

      - name: Prepare image metadata
        run: |
          mkdir -p artifacts
          printf "secure-app:%s\n" "${GITHUB_SHA}" > artifacts/image-identifier.txt
      - name: Upload image build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: image-build-${{ github.sha }}
          path: |
            /tmp/secure-app-${{ github.sha }}.tar
            artifacts/image-identifier.txt

  container-security:
    name: Container scan + SBOM (Trivy)
    runs-on: ubuntu-latest
    needs: [build-image]
    steps:
      - name: Download image build artifacts
        uses: actions/download-artifact@v4
        with:
          name: image-build-${{ github.sha }}
          path: /tmp/image-build
      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@v0.2.2
      - name: Load image from build artifact
        run: |
          docker load --input /tmp/image-build/secure-app-${{ github.sha }}.tar
      - name: Scan container image and create reports
        run: |
          mkdir -p artifacts
          trivy image secure-app:${{ github.sha }} \
            --format json \
            --output artifacts/vulnerability-scan.json \
            --ignore-unfixed \
            --vuln-type os,library \
            --severity CRITICAL,HIGH \
            --no-progress
          python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path("artifacts/vulnerability-scan.json").read_text())
          findings = 0
          for result in report.get("Results", []):
              findings += len(result.get("Vulnerabilities", []))
          Path("artifacts/vulnerability-scan-summary.txt").write_text(
              f"critical_high_vulnerabilities={findings}\n"
          )
          print(Path("artifacts/vulnerability-scan-summary.txt").read_text())
          if findings > 0:
              raise SystemExit("Container vulnerability scan failed: CRITICAL/HIGH findings detected.")
          PY
      - name: Generate SBOM (CycloneDX)
        run: |
          trivy image secure-app:${{ github.sha }} \
            --format cyclonedx \
            --output artifacts/sbom.cdx.json \
            --no-progress
          cp /tmp/image-build/image-identifier.txt artifacts/image-identifier.txt
      - name: Upload container security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: container-security-${{ github.sha }}
          path: artifacts/

  trusted-build:
    name: Mark trusted build
    runs-on: ubuntu-latest
    needs: [container-security]
    steps:
      - name: Download container security artifacts
        uses: actions/download-artifact@v4
        with:
          name: container-security-${{ github.sha }}
          path: /tmp/container-security
      - name: Create trusted build attestation
        run: |
          mkdir -p artifacts
          image_identifier=$(cat /tmp/container-security/image-identifier.txt)
          cat > artifacts/trusted-build.json <<EOF
          {
            "trusted": true,
            "repository": "${GITHUB_REPOSITORY}",
            "commit_sha": "${GITHUB_SHA}",
            "image_identifier": "${image_identifier}",
            "sbom": "sbom.cdx.json",
            "vulnerability_summary": "vulnerability-scan-summary.txt",
            "marked_at_utc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          cat artifacts/trusted-build.json
      - name: Upload trusted build artifact
        uses: actions/upload-artifact@v4
        with:
          name: trusted-build-${{ github.sha }}
          path: artifacts/trusted-build.json
